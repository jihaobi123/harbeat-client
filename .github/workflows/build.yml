name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Download and verify gradle-wrapper.jar
        run: |
          set -e
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          
          echo "Downloading Gradle wrapper..."
          curl -L --retry 3 --retry-delay 5 --fail -o /tmp/gradle-wrapper.jar https://github.com/nicoulaj/gradle-dist/raw/refs/heads/master/gradle-8.14/wrapper/gradle-wrapper.jar
          
          echo "Checking file size..."
          SIZE=$(stat -c%s /tmp/gradle-wrapper.jar)
          echo "Downloaded size: $SIZE bytes"
          
          if [ "$SIZE" -lt 10000 ]; then
            echo "Error: Downloaded file is too small (likely HTML error)"
            cat /tmp/gradle-wrapper.jar
            exit 1
          fi
          
          echo "Copying to project..."
          cp /tmp/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          
          echo "Verifying JAR..."
          unzip -l android/gradle/wrapper/gradle-wrapper.jar | grep -i "gradlewrappermain"
          
          ls -la android/gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List build outputs
        run: ls -la build/app/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/apk/debug/*.apk