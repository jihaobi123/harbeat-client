name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Debug - Check current directory and files
        run: |
          pwd
          ls -la
          ls -la android/gradle/wrapper/

      - name: Download correct gradle-wrapper.jar from full distribution
        run: |
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          echo "Downloading Gradle 8.14..."
          curl -L -o /tmp/gradle-8.14-all.zip https://services.gradle.org/distributions/gradle-8.14-all.zip
          echo "Unzipping gradle-wrapper.jar..."
          unzip -o /tmp/gradle-8.14-all.zip "gradle-8.14/wrapper/gradle-wrapper.jar" -d /tmp
          cp /tmp/gradle-8.14/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          rm -rf /tmp/gradle-8.14 /tmp/gradle-8.14-all.zip
          echo "Files in wrapper directory:"
          ls -la android/gradle/wrapper/
          echo "Verifying JAR content..."
          unzip -l android/gradle/wrapper/gradle-wrapper.jar | grep -i "GradleWrapperMain"
          echo "Testing gradle-wrapper.jar..."
          java -jar android/gradle/wrapper/gradle-wrapper.jar --version

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List build outputs
        run: ls -la build/app/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/apk/debug/*.apk