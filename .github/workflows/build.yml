name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Download gradle-wrapper.jar
        run: |
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          ls -la android/gradle/wrapper/
          
          echo "Checking JAR content..."
          unzip -l android/gradle/wrapper/gradle-wrapper.jar | head -20
          
          echo "Looking for GradleWrapperMain..."
          unzip -l android/gradle/wrapper/gradle-wrapper.jar | grep -i "gradlewrappermain" || echo "Not found - checking full list"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List build outputs
        run: ls -la build/app/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/apk/debug/*.apk