name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Verify gradle-wrapper.jar
        run: |
          ls -la android/gradle/wrapper/
          java -jar android/gradle/wrapper/gradle-wrapper.jar --version || echo "JAR file verification"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List build outputs
        run: ls -la build/app/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/apk/debug/*.apk