services:
  app:
    build: .
    container_name: harbeat-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - music_data:/app/data/music-files

  redis:
    image: redis:7
    container_name: harbeat-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27
    container_name: harbeat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  music_data:
  redis_data:
