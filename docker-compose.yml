services:
  app:
    build: .
    container_name: harbeat-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - music_data:/app/data/music-files
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M
    environment:
      - MALLOC_ARENA_MAX=2
      - PYTHONDONTWRITEBYTECODE=1

  redis:
    image: redis:7
    container_name: harbeat-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  nginx:
    image: nginx:1.27
    container_name: harbeat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  music_data:
  redis_data:
