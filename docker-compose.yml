services:
  app:
    build: .
    container_name: harbeat-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - music_data:/app/data/music-files

  postgres:
    image: postgres:16
    container_name: harbeat-postgres
    environment:
      POSTGRES_DB: rhythm_prism
      POSTGRES_USER: harbeat
      POSTGRES_PASSWORD: Hb12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: harbeat-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27
    container_name: harbeat-nginx
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  music_data:











#包含两个服务：1. PostgreSQL 15，设置默认用户名、密码和数据库名为 dance_db；2. Redis 最新版。请将它们的端口映射到宿主机，并添加数据卷挂载以持久化数据。”
#补全.env版本
services:
  postgres:
    image: postgres:15
    container_name: dance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dance_db
      POSTGRES_PASSWORD: dance_db
      POSTGRES_DB: dance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: dance_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: